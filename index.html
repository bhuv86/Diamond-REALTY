<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Meridian Land</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-shell">
  <div class="login-card parcel">
    <span class="tick-bl"></span><span class="tick-br"></span>
    <div class="eyebrow">Meridian Land</div>
    <h2>Admin sign in</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {% if category=='error' %}flash-error{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="field" style="margin-bottom:14px;">
        <label>Username</label>
        <input type="text" name="username" required autofocus style="width:100%;">
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" name="password" required style="width:100%;">
      </div>
      <button type="submit" class="btn btn-brass" style="width:100%;">Sign in</button>
    </form>
  </div>
</div>
</body>
</html>
