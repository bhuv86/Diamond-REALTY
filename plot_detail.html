{% extends "admin/base.html" %}
{% block title %}{% if plot %}Edit{% else %}New{% endif %} Plot — Admin{% endblock %}
{% block admin_content %}
<div class="eyebrow">{% if plot %}Edit{% else %}New{% endif %}</div>
<h1 style="font-size:1.9rem;">{% if plot %}Edit plot{% else %}New plot{% endif %}</h1>

<form method="POST" style="max-width:560px; margin-top:24px;">
  <div class="field" style="margin-bottom:16px;">
    <label>Project</label>
    <select name="project_id" required style="width:100%;">
      <option value="">Select project</option>
      {% for p in projects %}
      <option value="{{ p.id }}" {% if plot and plot.project_id==p.id %}selected{% endif %}>{{ p.name }} — {{ p.location }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field" style="margin-bottom:16px;">
    <label>Plot number</label>
    <input type="text" name="plot_number" required style="width:100%;" value="{{ plot.plot_number if plot else '' }}">
  </div>
  <div class="field" style="margin-bottom:16px;">
    <label>Size (sqft)</label>
    <input type="number" step="0.01" name="size_sqft" required style="width:100%;" value="{{ plot.size_sqft if plot else '' }}">
  </div>
  <div class="field" style="margin-bottom:16px;">
    <label>Facing</label>
    <input type="text" name="facing" placeholder="e.g. East" style="width:100%;" value="{{ plot.facing if plot else '' }}">
  </div>
  <div class="field" style="margin-bottom:16px;">
    <label>Price (₹)</label>
    <input type="number" step="0.01" name="price" required style="width:100%;" value="{{ plot.price if plot else '' }}">
  </div>
  <div class="field" style="margin-bottom:16px;">
    <label>Status</label>
    <select name="status" style="width:100%;">
      {% for s in ['Available','Reserved','Sold'] %}
      <option value="{{ s }}" {% if plot and plot.status==s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field" style="margin-bottom:20px;">
    <label>Image URL (optional)</label>
    <input type="text" name="image" style="width:100%;" value="{{ plot.image if plot else '' }}">
  </div>
  <button type="submit" class="btn btn-brass">{% if plot %}Save changes{% else %}Create plot{% endif %}</button>
  <a href="{{ url_for('admin_plots') }}" class="btn btn-outline">Cancel</a>
</form>
{% endblock %}
